name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
      publish:
        description: "Publish to Maven Central?"
        required: true
        default: "false"
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PR_KEY }}"
          echo "${{ secrets.GPG_PR_KEY }}" | base64 --decode | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set Maven version
        run: mvn -B versions:set versions:commit -DnewVersion=${{ env.VERSION }}

      # Step 1: Build + stage artifacts locally
      - name: Build & Stage
        run: mvn -B clean deploy

      # Step 2: Publish using JReleaser
      - name: Publish with JReleaser
        run: mvn -B jreleaser:full-release
        env:
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PR_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PARSE }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_TOKEN_PASSWORD }}