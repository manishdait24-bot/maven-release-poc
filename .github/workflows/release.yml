name: Release Artifacts

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java & Maven Central
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PR_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set Maven version
        run: mvn -B versions:set versions:commit -DnewVersion=${{ env.VERSION }}

      - name: Build
        run: mvn -B clean verify

      - name: Publish to Maven Central
        run: mvn -B deploy -Dgpg.passphrase=${{ secrets.GPG_PARSE }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_TOKEN_PASSWORD }}