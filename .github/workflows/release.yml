name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
      publish:
        description: "Publish to Maven Central?"
        required: true
        default: "false"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PR_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf

      # Set version from input
      - name: Set Maven version
        run: mvn -B versions:set versions:commit -DnewVersion=${{ github.event.inputs.version }}

      # Stage artifacts locally using your profile
      - name: Build & Stage (publication profile)
        run: mvn -B -Ppublication deploy

      # Publish using JReleaser
      - name: Publish with JReleaser
        if: ${{ github.event.inputs.publish == 'true' }}
        run: mvn -B -Ppublication jreleaser:full-release
        env:
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PR_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PARSE }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_TOKEN_PASSWORD }}

      - name: Skip Publish
        if: ${{ github.event.inputs.publish != 'true' }}
        run: echo "Skipping publish (dry run)"